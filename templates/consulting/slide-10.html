<!DOCTYPE html>
<html lang="en">
<head>

  <title>Slide</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #000000;
      width: 1920px;
      height: 1080px;

      flex-direction: column;
      padding: 80px 120px;
    }
    .label {
      font-size: 14px;
      font-weight: 600;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 32px;
    }
    .headline {
      font-size: 56px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 48px;
    }
    .content {
      font-size: 24px;
      line-height: 1.7;
      color: #333333;
      max-width: 1400px;
    }
    .content strong {
      color: #000000;
    }
  </style>
</head>

                            </div>

                                <div style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">Dr. Emily Watson</div>

                                <div style="font-size: 16px; color: rgba(255,255,255,0.6);">emily.watson@apex.com</div>
                            </div>
