<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=1920">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
@page { size: 1920px 1080px; margin: 0; }
html { height: 1080px; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; background: url(bg-closing-fullbleed.jpg) center center / cover no-repeat; position: relative; }
.content { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 0 120px 80px; }
.quote-block { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px 28px; max-width: 520px; margin-bottom: 40px; }
.quote-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.quote-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
.quote-name { font-size: 14px; font-weight: 600; color: #fff; }
.quote-handle { font-size: 12px; color: rgba(255,255,255,0.5); }
.quote-x { margin-left: auto; }
.quote-text { font-size: 16px; color: rgba(255,255,255,0.9); line-height: 1.5; font-style: italic; }
.quote-src { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 8px; }
.main-line { font-family: 'Inter', sans-serif; font-size: 56px; font-weight: 700; line-height: 1.15; letter-spacing: -0.02em; color: #ffffff; }
.main-line em { font-style: italic; color: #10b981; }
.caption { font-size: 16px; color: rgba(255,255,255,0.4); margin-top: 20px; font-weight: 500; }
.logo { position: absolute; bottom: 48px; left: 120px; display: flex; align-items: center; gap: 12px; z-index: 1; }
.logo svg { width: 24px; height: 24px; }
.logo span { font-family: 'Inter', sans-serif; font-size: 21px; font-weight: 700; color: rgba(255,255,255,0.6); margin-top: 2px; }
.logo-url { font-size: 14px; color: rgba(255,255,255,0.4); margin-left: 16px; font-family: 'JetBrains Mono', monospace; }
</style></head><body>
<div class="content">
  <div class="quote-block">
    <div class="quote-header">
      <img class="quote-avatar" src="sam-altman-real.jpg">
      <div>
        <div class="quote-name">Sam Altman</div>
        <div class="quote-handle">@sama</div>
      </div>
      <svg class="quote-x" viewBox="0 0 24 24" width="18" height="18" fill="rgba(255,255,255,0.3)"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    </div>
    <div class="quote-text">"Build the fastest-iterating company the world has ever seen."</div>
    <div class="quote-src">Stanford Online</div>
  </div>
  <div class="main-line">What if <span style="text-decoration:underline;text-underline-offset:8px;text-decoration-thickness:3px;">every</span> company<br>could iterate <em>10x faster?</em></div>
  <div class="caption">That is what floom builds.</div>
</div>
<div class="logo">
  <svg viewBox="0 0 46 40" xmlns="http://www.w3.org/2000/svg"><path d="M10 6 Q4 6 4 12 L4 36 Q4 42 10 42 L28 42 L44 24 L28 6 Z" fill="#10b981"></path></svg>
  <span>floom</span>
  <span class="logo-url">floom.dev</span>
</div>
</body></html>
